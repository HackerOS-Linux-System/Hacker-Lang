[workspace]
members = [
    "source-code/core",
    "source-code/shell",
    "source-code/cli",
]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2021"
authors = ["HackerOS Team <hackeros068@gmail.com>"]
license = "GPL-3.0"

[workspace.dependencies]
anyhow = "1.0"
thiserror = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1.0", features = ["full"] }
clap = { version = "4.0", features = ["derive", "color"] }
colored = "2.0"
rustyline = "14.0"
nix = { version = "0.27", features = ["process", "signal", "user"] }
which = "6.0"
dirs = "5.0"
